 <!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIBLIA RV 1960 </title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
</head>


<body>
<div class="menu-config">

<button id="btnConfig" onclick="toggleMenu()">
⚙️
</button>

<div id="panelConfig" class="panel-config">

<button onclick="cambiarFuente(-2)">
A-
</button>

<button onclick="cambiarFuente(2)">
A+
</button>

<button id="btnTema"
onclick="toggleDarkMode()">
 ☀️
</button>
 
<button onclick="mostrarFavoritos()">
⭐
</button>
</div>
</div>
<header>

<h1>BIBLIA RV 1960</h1>
 
<input
type="text"
id="buscar"
placeholder="Buscar versículo..."
>

</header>
<div id="versiculoDia" class="versiculo-dia">

    <h3>🌞 Versículo del día</h3>

    <p id="textoVersiculoDia"></p>

    <small id="referenciaVersiculoDia"></small>

    <div class="acciones-versiculo">

        <button onclick="copiarVersiculoDia()">
            📋 
        </button>

        <button onclick="leerVersiculoDia()">
            🔊 
        </button>

    </div>

</div>
<!-- LIBROS -->
<div id="listaLibros">

   <div class="selector-testamento">

        <button
id="btnAntiguo"
class="activo"
onclick="mostrarTestamento('Antiguo')">

ANTIGUO

</button>

<button
id="btnNuevo"
onclick="mostrarTestamento('Nuevo')">

NUEVO

</button>

    </div>

    <div id="contenedorLibros"></div>

</div>



<!-- CAPÍTULOS -->

<section
id="capitulos"
style="display:none;">

<button
class="volver"
onclick="volverLibros()">

Volver

</button>

<h2 id="tituloLibro"></h2>

<div id="listaCapitulos"></div>

</section>

<!-- TEXTO -->

<section
id="textoCapitulo"
style="display:none;">

<button
class="volver"
onclick="volverCapitulos()">
 Volver
</button>
 
<div class="navegacion-capitulos">

<button onclick="capituloAnterior()">
⬅ 
</button>

<button id="btnLeer" onclick="leerCapitulo()">
🔊 
</button>
 
<button onclick="pausarLectura()">
 ⏸ 
 </button>
 
 <button onclick="continuarLectura()">
  ▶ 
  </button>
 
<button id="btnDetener" onclick="detenerLectura()">
⏹ 
</button>

<button onclick="capituloSiguiente()">
 ➡
</button>

</div>

<h2 id="tituloCapitulo"></h2>
<div id="contenidoCapitulo"></div>
</section>
 
<footer class="pie-app">

Biblia RV1960 © 2026
Desarrollada por JC Aguilera Studio

</footer>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("SW registrado"))
      .catch(err => console.error("Error SW:", err));
  });
}

</script>
 <div id="menuVersiculo" class="menu-versiculo">

 <button onclick="compartirVersiculoSeleccionado()">
        📤 Compartir
    </button>

    <button onclick="copiarVersiculoSeleccionado()">
        📋 Copiar
    </button>

    <button onclick="abrirNota()">
        📝 Agregar nota
    </button>

    <button onclick="cerrarMenuVersiculo()">
        ❌ Cancelar
    </button>


</div>
 <div id="ventanaNota" class="ventana-nota">

    <div class="contenido-nota">

        <h3 id="tituloNota">
            📝 Nota
        </h3>

        <textarea
            id="textoNota"
            placeholder="Escribe aquí tu nota..."
        ></textarea>

        <div class="botones-nota">

            <button onclick="guardarNota()">
                💾 Guardar
            </button>

            <button onclick="eliminarNota()">
                🗑 Eliminar
            </button>

            <button onclick="cerrarNota()">
                ❌ Cancelar
            </button>

        </div>

    </div>

</div>
</body>
</html>
